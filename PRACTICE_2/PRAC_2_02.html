<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Travel Goals Landing Page</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #f4f4f4;
        }

        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 15px 40px;
            background-color: rgba(106, 196, 175, 0.85);
            z-index: 10;
        }

        .logo {
            font-size: 22px;
            font-weight: 700;
            color: #f1c40f;
            font-style: italic;
            letter-spacing: 1px;
        }

        nav a {
            color: #fff;
            text-decoration: none;
            margin-left: 30px;
            font-size: 14px;
            font-weight: 500;
        }

        .hero {
            height: 65vh;
            background: url('https://images.unsplash.com/photo-1544551763-46a013bb70d5?ixlib=rb-4.0.3&auto=format&fit=crop&w=1920&q=80') no-repeat center center/cover;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .hero-box {
            background-color: rgba(50, 50, 50, 0.75);
            padding: 40px 60px;
            text-align: center;
            border-radius: 4px;
            color: #fff;
        }

        .hero-box h1 {
            font-size: 28px;
            margin-bottom: 15px;
            font-weight: 600;
            letter-spacing: 1px;
        }

        .hero-box p {
            font-size: 12px;
            margin-bottom: 25px;
            letter-spacing: 2px;
        }

        .btn {
            display: inline-block;
            background-color: #ffeb3b;
            color: #000;
            padding: 10px 25px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            border-radius: 3px;
        }

        .highlights {
            background-color: #e0f7fa;
            padding: 50px 20px;
            text-align: center;
        }

        .highlights h2 {
            font-size: 18px;
            color: #333;
            margin-bottom: 40px;
            letter-spacing: 1px;
        }

        .card-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            flex-wrap: wrap;
        }

        .card {
            width: 300px;
        }

        .card img {
            width: 100%;
            height: 160px;
            object-fit: cover;
            border-radius: 6px;
            margin-bottom: 15px;
        }

        .card p {
            font-size: 13px;
            color: #00838f;
        }

        .card strong {
            font-weight: 700;
        }

        footer {
            background-color: #212121;
            padding: 20px 0;
            display: flex;
            justify-content: center;
            gap: 25px;
        }

        footer a {
            color: #fff;
            font-size: 22px;
            text-decoration: none;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">TRAVEL GOALS</div>
        <nav>
            <a href="#">Destinations</a>
            <a href="#">About</a>
        </nav>
    </header>

    <main>
        <section class="hero">
            <div class="hero-box">
                <h1>JOE'S TRAVEL PAGE</h1>
                <p>LET'S EXPLORE THE WORLD TOGETHER!</p>
                <a href="#" class="btn">Discover places</a>
            </div>
        </section>

        <section class="highlights">
            <h2>HIGHLIGHTS</h2>
            <div class="card-container">
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1533106497176-45ae19e68ba2?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Miami">
                    <p>MIAMI <strong>USA</strong></p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1595867499684-28c11e738d0d?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Munich">
                    <p>MUNICH <strong>GERMANY</strong></p>
                </div>
                <div class="card">
                    <img src="https://images.unsplash.com/photo-1583422409516-15eba534e857?ixlib=rb-4.0.3&auto=format&fit=crop&w=600&q=80" alt="Barcelona">
                    <p>BARCELONA <strong>SPAIN</strong></p>
                </div>
            </div>
        </section>
    </main>

    <footer>
        <a href="#"><i class="fa-brands fa-instagram"></i></a>
        <a href="#"><i class="fa-brands fa-facebook"></i></a>
    </footer>

</body>
</html>
