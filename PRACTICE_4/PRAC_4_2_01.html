<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dang Ky Tai Khoan</title>
    <style>
        body { font-family: Arial, sans-serif; padding: 20px; max-width: 500px; margin: 0 auto; }
        .form-group { margin-bottom: 15px; }
        label { display: block; margin-bottom: 5px; font-weight: bold; }
        input[type="text"], input[type="email"], input[type="password"], input[type="number"] {
            width: 100%; padding: 8px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box;
        }
        .error-msg { color: red; font-size: 13px; display: none; margin-top: 5px; }
        .input-error { border-color: red !important; background-color: #ffe6e6; }
        .success-msg { color: green; font-size: 20px; font-weight: bold; display: none; text-align: center; margin-top: 50px; }
        button { padding: 10px 15px; background-color: blue; color: white; border: none; border-radius: 4px; cursor: pointer; width: 100%; font-size: 16px; font-weight: bold; }
        button:hover { background-color: darkblue; }
        .radio-group, .checkbox-group { display: flex; align-items: center; gap: 10px; font-weight: normal; }
    </style>
</head>
<body>

    <div id="formContainer">
        <h2>Đăng Ký Tài Khoản</h2>
        <form id="registerForm">
            <div class="form-group">
                <label>Họ và tên:</label>
                <input type="text" id="fullname" placeholder="Nhập họ và tên">
                <span class="error-msg" id="err-fullname"></span>
            </div>

            <div class="form-group">
                <label>Email:</label>
                <input type="email" id="email" placeholder="name@domain.com">
                <span class="error-msg" id="err-email"></span>
            </div>

            <div class="form-group">
                <label>Số điện thoại:</label>
                <input type="text" id="phone" placeholder="0xxxxxxxxx">
                <span class="error-msg" id="err-phone"></span>
            </div>

            <div class="form-group">
                <label>Mật khẩu:</label>
                <input type="password" id="password" placeholder="Tối thiểu 8 ký tự, 1 hoa, 1 thường, 1 số">
                <span class="error-msg" id="err-password"></span>
            </div>

            <div class="form-group">
                <label>Xác nhận mật khẩu:</label>
                <input type="password" id="confirmPassword" placeholder="Nhập lại mật khẩu">
                <span class="error-msg" id="err-confirmPassword"></span>
            </div>

            <div class="form-group">
                <label>Giới tính:</label>
                <div class="radio-group">
                    <input type="radio" name="gender" id="genderNam" value="Nam"> Nam
                    <input type="radio" name="gender" id="genderNu" value="Nữ"> Nữ
                </div>
                <span class="error-msg" id="err-gender"></span>
            </div>

            <div class="form-group">
                <div class="checkbox-group">
                    <input type="checkbox" id="terms"> Tôi đồng ý với các điều khoản
                </div>
                <span class="error-msg" id="err-terms"></span>
            </div>

            <button type="submit">Đăng Ký</button>
        </form>
    </div>

    <div id="successContainer" class="success-msg">
        Đăng ký thành công! 🎉 <br> Chào mừng, <span id="displayFullName"></span>!
    </div>

    <script>
        function showError(fieldId, message) {
            let errorSpan = document.getElementById('err-' + fieldId);
            let inputField = document.getElementById(fieldId);
            
            errorSpan.innerText = message;
            errorSpan.style.display = 'block';
            
            if (inputField && inputField.type !== 'radio' && inputField.type !== 'checkbox') {
                inputField.classList.add('input-error');
            }
        }

        function clearError(fieldId) {
            let errorSpan = document.getElementById('err-' + fieldId);
            let inputField = document.getElementById(fieldId);
            
            errorSpan.innerText = '';
            errorSpan.style.display = 'none';
            
            if (inputField && inputField.type !== 'radio' && inputField.type !== 'checkbox') {
                inputField.classList.remove('input-error');
            }
        }

        function validateFullname() {
            let val = document.getElementById('fullname').value.trim();
            let regex = /^[a-zA-ZÀ-ỹ\s]+$/;
            
            if (val === "") {
                showError('fullname', 'Họ tên không được để trống');
                return false;
            }
            if (val.length < 3) {
                showError('fullname', 'Họ tên phải từ 3 ký tự trở lên');
                return false;
            }
            if (!regex.test(val)) {
                showError('fullname', 'Họ tên chỉ được chứa chữ cái và khoảng trắng');
                return false;
            }
            clearError('fullname');
            return true;
        }

        function validateEmail() {
            let val = document.getElementById('email').value.trim();
            let regex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            
            if (val === "") {
                showError('email', 'Email không được để trống');
                return false;
            }
            if (!regex.test(val)) {
                showError('email', 'Email không đúng định dạng');
                return false;
            }
            clearError('email');
            return true;
        }

        function validatePhone() {
            let val = document.getElementById('phone').value.trim();
            let regex = /^0[0-9]{9}$/;
            
            if (val === "") {
                showError('phone', 'Số điện thoại không được để trống');
                return false;
            }
            if (!regex.test(val)) {
                showError('phone', 'SĐT phải có 10 chữ số và bắt đầu bằng số 0');
                return false;
            }
            clearError('phone');
            return true;
        }

        function validatePassword() {
            let val = document.getElementById('password').value;
            let regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d).{8,}$/;
            
            if (val === "") {
                showError('password', 'Mật khẩu không được để trống');
                return false;
            }
            if (!regex.test(val)) {
                showError('password', 'Mật khẩu tối thiểu 8 ký tự, gồm 1 hoa, 1 thường, 1 số');
                return false;
            }
            clearError('password');
            validateConfirmPassword();
            return true;
        }

        function validateConfirmPassword() {
            let pass = document.getElementById('password').value;
            let val = document.getElementById('confirmPassword').value;
            
            if (val === "") {
                showError('confirmPassword', 'Vui lòng xác nhận mật khẩu');
                return false;
            }
            if (val !== pass) {
                showError('confirmPassword', 'Mật khẩu không khớp');
                return false;
            }
            clearError('confirmPassword');
            return true;
        }

        function validateGender() {
            let nam = document.getElementById('genderNam').checked;
            let nu = document.getElementById('genderNu').checked;
            
            if (!nam && !nu) {
                showError('gender', 'Vui lòng chọn giới tính');
                return false;
            }
            clearError('gender');
            return true;
        }

        function validateTerms() {
            let checked = document.getElementById('terms').checked;
            
            if (!checked) {
                showError('terms', 'Bạn phải đồng ý với điều khoản');
                return false;
            }
            clearError('terms');
            return true;
        }

        document.getElementById('fullname').onblur = validateFullname;
        document.getElementById('email').onblur = validateEmail;
        document.getElementById('phone').onblur = validatePhone;
        document.getElementById('password').onblur = validatePassword;
        document.getElementById('confirmPassword').onblur = validateConfirmPassword;

        document.getElementById('fullname').oninput = function() { clearError('fullname'); };
        document.getElementById('email').oninput = function() { clearError('email'); };
        document.getElementById('phone').oninput = function() { clearError('phone'); };
        document.getElementById('password').oninput = function() { clearError('password'); };
        document.getElementById('confirmPassword').oninput = function() { clearError('confirmPassword'); };
        
        document.getElementById('genderNam').onchange = function() { clearError('gender'); };
        document.getElementById('genderNu').onchange = function() { clearError('gender'); };
        document.getElementById('terms').onchange = function() { clearError('terms'); };

        document.getElementById('registerForm').onsubmit = function(event) {
            event.preventDefault();
            
            let isVFullname = validateFullname();
            let isVEmail = validateEmail();
            let isVPhone = validatePhone();
            let isVPassword = validatePassword();
            let isVConfirm = validateConfirmPassword();
            let isVGender = validateGender();
            let isVTerms = validateTerms();
            
            let isFormValid = isVFullname & isVEmail & isVPhone & isVPassword & isVConfirm & isVGender & isVTerms;
            
            if (isFormValid) {
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successContainer').style.display = 'block';
                document.getElementById('displayFullName').innerText = document.getElementById('fullname').value;
            }
        };
    </script>
</body>
</html>
